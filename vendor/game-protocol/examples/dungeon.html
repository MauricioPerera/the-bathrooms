<!doctype html>
<meta charset="utf-8">
<title>GAME Protocol · dungeon (multi-sala desde la spec)</title>
<style>
  html,body{margin:0;height:100%;background:#0b0e13;color:#cdd6e4;font:14px/1.45 system-ui;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px}
  #title{font-weight:600}#title b{color:#8fd6ff}
  #hud{display:flex;gap:18px;font-size:13px;color:#9fb0c3}#hud b{color:#ffd86b}
  canvas{image-rendering:pixelated;border:1px solid #2a3340;background:#000}
  #msg{min-height:2.4em;max-width:600px;text-align:center;padding:6px 10px;background:#141a22;border-radius:6px}
  #msg.win{color:#9fffa6;font-weight:600}
  #hint{color:#6b7685;font-size:12px}
  #mapwrap{position:fixed;top:14px;right:14px;background:#11161d;border:1px solid #2a3340;border-radius:8px;padding:8px 10px}
  #mapwrap div{font-size:11px;color:#7b8696;margin-bottom:4px;text-align:center;letter-spacing:.5px}
  #map{display:block;image-rendering:pixelated}
</style>
<div id="title"></div>
<div id="hud"><span id="scene"></span><span id="hp"></span><span id="inv"></span></div>
<canvas id="c"></canvas>
<div id="mapwrap"><div>MAPA</div><canvas id="map"></canvas></div>
<div id="msg"></div>
<div id="hint">← ↑ → ↓ moverse · Espacio: hablar</div>

<script src="dungeon.generated.js"></script>
<script src="engine-core.js"></script>
<script>
const G = window.GAME, SCALE = 6, TS = 8 * SCALE;
const ART = G.TILE_ART, PAL = G.PALETTES, TILES = G.TILES;
const ANIM = new Set((G.ANIMATE && G.ANIMATE.water) || []);
document.getElementById('title').innerHTML = `<b>${EngineCore.esc(G.name || 'Mazmorra')}</b> — dungeon multi-sala, render desde tileArt del GAME.md`;

let cur = G.PLAYER.start.scene;
let player = { col: G.PLAYER.start.col, row: G.PLAYER.start.row };
const inv = new Set();
const collected = new Set();   // "scene/item" recogidos
const visited = new Set([cur]);
let hp = G.PLAYER.hp || 3, invuln = 0;
const enemyState = {};   // por escena: copia mutable de enemies con {alive,dir,hp,col,row}
let won = false, frame = 0;
function enemiesOf(name) {
  if (!enemyState[name]) enemyState[name] = (G.SCENES[name].enemies || []).map(e => ({ col: e.col, row: e.row, tile: e.tile, pal: e.pal, hp: e.hp || 1, dir: e.dir || 1, axis: e.axis || 'h', alive: true }));
  return enemyState[name];
}

const cv = document.getElementById('c'), ctx = cv.getContext('2d');
function scene() { return G.SCENES[cur]; }
function sizeCanvas() { const s = scene(); cv.width = s.tilemap[0].length * TS; cv.height = s.tilemap.length * TS; }
sizeCanvas();

const _R = EngineCore.makeRenderer(ctx, { ART, PAL, SCALE });
const rgb = _R.rgb;
// shimmer del agua: intercambia los indices 10/11 en tiles de ANIM segun el frame
const waterRemap = (i, id) => (ANIM.has(id) && ((frame >> 3) & 1) && (i === 10 || i === 11)) ? (i === 10 ? 11 : 10) : i;
const drawTile = (id, p, col, row, t0) => _R.drawTile(id, p, col, row, t0, waterRemap);

function render() {
  const s = scene(), tm = s.tilemap, at = s.attrs;
  for (let r = 0; r < tm.length; r++) for (let c = 0; c < tm[0].length; c++) drawTile(tm[r][c], at[r][c], c, r, false);
  for (const w of s.warps) drawTile(w.tile, w.pal, w.col, w.row, true);
  for (const p of s.pickups) if (!collected.has(cur + '/' + p.item)) drawTile(p.tile, p.pal, p.col, p.row, true);
  for (const n of s.npcs) drawTile(n.tile, n.pal, n.col, n.row, true);
  for (const e of enemiesOf(cur)) if (e.alive) drawTile(e.tile, e.pal, e.col, e.row, true);
  if (s.goal) drawTile(s.goal.tile, s.goal.pal, s.goal.col, s.goal.row, true);
  if (!(invuln > 0 && ((frame >> 2) & 1))) drawTile(G.PLAYER.tile, G.PLAYER.pal, player.col, player.row, true);
}

function setMsg(t, win) { const m = document.getElementById('msg'); m.textContent = t; m.className = win ? 'win' : ''; }
function updHud() {
  document.getElementById('scene').textContent = 'Sala: ' + cur;
  document.getElementById('hp').innerHTML = 'Vida: <b style="color:#ff7b7b">' + '♥'.repeat(Math.max(0, hp)) + '</b>';
  document.getElementById('inv').innerHTML = 'Inventario: ' + (inv.size ? [...inv].map(i => '<b>' + EngineCore.esc(i) + '</b>').join(', ') : '—');
}

function solid(c, r) {
  const s = scene(), tm = s.tilemap;
  if (c < 0 || r < 0 || r >= tm.length || c >= tm[0].length) return true;
  for (const n of s.npcs) if (n.col === c && n.row === r) return true;
  for (const w of s.warps) if (w.col === c && w.row === r) return false; // warps siempre pisables
  if (s.goal && s.goal.col === c && s.goal.row === r) return false;
  return !!(TILES[String(tm[r][c])] && TILES[String(tm[r][c])].solid);
}
function enterScene(name, at) { cur = name; player = { col: at.col, row: at.row }; visited.add(name); sizeCanvas(); updHud(); renderMap(); }

// --- MINIMAPA: dibuja las salas por su map.x/y, conexiones por warps, actual resaltada, niebla de guerra ---
const mapCanvas = document.getElementById('map'), mctx = mapCanvas.getContext('2d');
function renderMap() {
  const scenes = G.SCENES;
  const placed = Object.entries(scenes).filter(([, s]) => s.map);
  if (!placed.length) { document.getElementById('mapwrap').style.display = 'none'; return; }
  let minx = Infinity, miny = Infinity, maxx = -Infinity, maxy = -Infinity;
  for (const [, s] of placed) { minx = Math.min(minx, s.map.x); miny = Math.min(miny, s.map.y); maxx = Math.max(maxx, s.map.x); maxy = Math.max(maxy, s.map.y); }
  const cell = 36, box = 26, pad = 8;
  mapCanvas.width = (maxx - minx + 1) * cell + pad * 2; mapCanvas.height = (maxy - miny + 1) * cell + pad * 2;
  const cx = s => pad + (s.map.x - minx) * cell + cell / 2, cy = s => pad + (s.map.y - miny) * cell + cell / 2;
  mctx.clearRect(0, 0, mapCanvas.width, mapCanvas.height);
  const discovered = new Set(visited);
  for (const name of visited) for (const w of (scenes[name].warps || [])) discovered.add(w.to);
  mctx.lineWidth = 2;
  for (const [name, s] of placed) { if (!visited.has(name)) continue;
    for (const w of s.warps) { const t = scenes[w.to]; if (!t || !t.map) continue;
      mctx.strokeStyle = visited.has(w.to) ? '#54657d' : '#2b333f';
      mctx.beginPath(); mctx.moveTo(cx(s), cy(s)); mctx.lineTo(cx(t), cy(t)); mctx.stroke(); } }
  mctx.font = 'bold 9px system-ui'; mctx.textAlign = 'center'; mctx.textBaseline = 'middle';
  for (const [name, s] of placed) {
    const x = cx(s) - box / 2, y = cy(s) - box / 2; let label;
    if (name === cur) { mctx.fillStyle = '#ffd86b'; mctx.fillRect(x, y, box, box); mctx.fillStyle = '#11161d'; label = name.slice(0, 3); }
    else if (visited.has(name)) { mctx.fillStyle = '#3f5167'; mctx.fillRect(x, y, box, box); mctx.fillStyle = '#e6edf5'; label = name.slice(0, 3); }
    else if (discovered.has(name)) { mctx.strokeStyle = '#54657d'; mctx.strokeRect(x, y, box, box); mctx.fillStyle = '#7b8696'; label = '?'; }
    else continue;
    mctx.fillText(label, cx(s), cy(s));
  }
}

function move(dc, dr) {
  if (won) return;
  const s = scene(), nc = player.col + dc, nr = player.row + dr;
  const w = s.warps.find(w => w.col === nc && w.row === nr);
  if (w) {
    if (w.locked && !inv.has(w.locked)) { setMsg(G.TEXT.locked || 'Cerrada.'); return; }
    enterScene(w.to, w.at); setMsg('Entras en: ' + w.to); return;
  }
  if (solid(nc, nr)) return;
  player = { col: nc, row: nr };
  for (const p of s.pickups) if (!collected.has(cur + '/' + p.item) && p.col === nc && p.row === nr) {
    collected.add(cur + '/' + p.item); inv.add(p.item); setMsg(G.TEXT.got_key || ('Recogido: ' + p.item)); updHud();
  }
  if (enemiesOf(cur).some(e => e.alive && e.col === nc && e.row === nr)) hurt();
  if (s.goal && s.goal.col === nc && s.goal.row === nr) { won = true; setMsg((G.WIN && G.WIN.text) || '¡Ganaste!', true); }
}
function interact() {
  if (won) return;
  const s = scene();
  for (const e of enemiesOf(cur)) if (e.alive && Math.abs(e.col - player.col) + Math.abs(e.row - player.row) === 1) {
    e.hp--; if (e.hp <= 0) { e.alive = false; setMsg(G.TEXT.defeat || 'Enemigo derrotado.'); } else setMsg('Golpeas al enemigo · ' + e.hp + ' HP'); return;
  }
  for (const n of s.npcs) if (Math.abs(n.col - player.col) + Math.abs(n.row - player.row) === 1) { setMsg(G.TEXT[n.dialogue] || '...'); return; }
}
function solidForEnemy(c, r) {
  const tm = scene().tilemap;
  if (c < 0 || r < 0 || r >= tm.length || c >= tm[0].length) return true;
  return !!(TILES[String(tm[r][c])] && TILES[String(tm[r][c])].solid);
}
function patrol() {
  for (const e of enemiesOf(cur)) {
    if (!e.alive) continue;
    const dx = e.axis === 'v' ? 0 : e.dir, dy = e.axis === 'v' ? e.dir : 0;
    let nc = e.col + dx, nr = e.row + dy;
    if (solidForEnemy(nc, nr)) { e.dir *= -1; nc = e.col - dx; nr = e.row - dy; if (solidForEnemy(nc, nr)) continue; }
    e.col = nc; e.row = nr;
    if (e.col === player.col && e.row === player.row) hurt();
  }
}
function hurt() {
  if (invuln > 0 || won) return;
  hp--; invuln = 40; updHud();
  if (hp <= 0) { gameOver(); return; }
  setMsg(G.TEXT.hit || 'Te golpearon.'); player = { col: scene().entry.col, row: scene().entry.row };
}
function gameOver() {
  hp = G.PLAYER.hp || 3; invuln = 60; setMsg(G.TEXT.fallen || 'Has caido.');
  enterScene(G.PLAYER.start.scene, { col: G.PLAYER.start.col, row: G.PLAYER.start.row });
}

addEventListener('keydown', e => {
  const k = e.key;
  if (k === 'ArrowLeft') move(-1,0); else if (k === 'ArrowRight') move(1,0);
  else if (k === 'ArrowUp') move(0,-1); else if (k === 'ArrowDown') move(0,1);
  else if (k === ' ') interact(); else return;
  e.preventDefault();
});

setMsg(G.TEXT.intro || ''); updHud(); renderMap();
(function loop(){ requestAnimationFrame(loop); frame++; if (invuln > 0) invuln--; if (frame % 24 === 0) patrol(); render(); })();
</script>
