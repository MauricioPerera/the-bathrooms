<!doctype html>
<meta charset="utf-8">
<title>GAME Protocol · game3d (runtime multi-perfil Three.js)</title>
<style>
  html,body{margin:0;height:100%;background:#070a0f;overflow:hidden;font:13px/1.45 system-ui;color:#cdd6e4}
  #g3d-top{position:fixed;top:10px;left:12px;z-index:10}#g3d-top b{color:#8fd6ff}
  #g3d-side{position:fixed;top:10px;right:12px;z-index:10;display:flex;flex-direction:column;gap:4px}
  .chip{background:#141a22cc;border:1px solid #2a3340;border-radius:6px;padding:3px 8px;font-size:12px}.chip b{color:#9fffa6}
  #g3d-msg{position:fixed;left:50%;bottom:12px;transform:translateX(-50%);z-index:10;background:#141a22e6;border:1px solid #2a3340;
           border-radius:8px;padding:8px 14px;max-width:680px;min-height:1.2em;text-align:center}
  #g3d-msg.win{color:#9fffa6;font-weight:600}
  #g3d-panel{position:fixed;inset:auto 0 0 0;z-index:20;display:none;background:#0d1117f2;border-top:2px solid #2a3340;padding:14px 18px}
  #g3d-panel.on{display:block}
  #g3d-panel .row{display:flex;justify-content:space-between;max-width:760px;margin:0 auto 6px}
  #g3d-panel .menu{max-width:760px;margin:6px auto 0;color:#9fb0c3}#g3d-panel .menu b{color:#ffd479}
  #g3d-panel .blog{max-width:760px;margin:4px auto 0;font-size:12px;color:#7b8696;min-height:2.6em}
  .bar{display:inline-block;width:150px;height:9px;background:#22262e;border-radius:5px;overflow:hidden;vertical-align:middle;margin-left:8px}
  .bar i{display:block;height:100%;background:#9fffa6}
  #g3d-overlay{position:fixed;inset:0;z-index:30;display:none;align-items:center;justify-content:center;background:#070a0fee;
               font-size:20px;color:#9fffa6;text-align:center}
  #g3d-overlay.on{display:flex}
  #picker{position:fixed;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:10px;z-index:40;background:#070a0f}
  #picker a{display:block;min-width:340px;padding:10px 16px;background:#141a22;border:1px solid #2a3340;border-radius:8px;color:#cdd6e4;text-decoration:none}
  #picker a:hover{border-color:#8fd6ff}#picker a b{color:#8fd6ff}#picker a span{color:#7b8696;font-size:12px;display:block}
  #picker h1{font-size:17px;margin:0 0 6px}#picker h1 b{color:#8fd6ff}
</style>
<div id="g3d-top"></div><div id="g3d-side"></div><div id="g3d-msg"></div>
<div id="g3d-panel"></div><div id="g3d-overlay"></div>
<script type="importmap">
{ "imports": { "three": "https://unpkg.com/three@0.160.0/build/three.module.js" } }
</script>
<script type="module">
import { boot, runtimes } from './game3d.js';
const src = new URLSearchParams(location.search).get('game');
if (!src || !/^[a-z0-9-]+(\.GAME)?\.generated\.js$/i.test(src.split('/').pop())) {
  // sin parámetro: selector de juegos compatibles del repo (por perfil con runtime)
  const games = [
    ['game-data.generated.js', 'Demo Protocol Game', 'monster-rpg · terreno procedural (sin mapa field)'],
    ['monster-rpg.generated.js', 'Monster RPG Demo', 'monster-rpg'],
    ['kaiju-island.generated.js', 'Kaiju Island', 'monster-rpg · stress-test completo'],
    ['adventure.generated.js', 'Escape Room', 'adventure'],
    ['dungeon.generated.js', 'Mazmorra del Protocolo', 'dungeon'],
    ['el-faro-hundido.generated.js', 'El Faro Hundido', 'dungeon · juego completo'],
    ['voxel.generated.js', 'Voxel Hut', 'voxel'],
    ['quiz.generated.js', 'Quiz Island', 'quiz · perfil puro-datos (JSON)'],
    ['neon-swarm.generated.js', 'Neon Swarm', 'shooter · perfil puro-datos · simulación testeada en Node'],
    ['sudoku.generated.js', 'Sudoku', 'sudoku · perfil puro-datos · puzzles verificados (unicidad incluida)'],
    ['papers-please.generated.js', 'Border Checkpoint', 'papers-please · decisiones evaluadas por las RULES del día'],
    ['tower-defense.generated.js', 'Tower Defense Demo', 'tower-defense · simulación por ticks ganada/perdida en Node'],
    ['platformer.generated.js', 'Jumpy', 'platformer · geometría salvable por construcción · ganado por bot en Node'],
    ['crafting.generated.js', 'Forge', 'crafting · recetario completo como meta derivada de los datos'],
    ['roguelike.generated.js', 'Roguelike Procedural', 'roguelike · lógica compartida con el visor 2D · mundo continuo + minimapa 3D + guardado'],
    ['advance-wars-extracted.generated.js', 'Advance Wars (Extracted)', 'advance-wars · visor del arte 4bpp extraído (el perfil solo modela arte)'],
    ['senku.generated.js', 'Senku', 'peg-solitaire · perfil puro-datos · tableros solubles por construcción'],
  ];
  const div = document.createElement('div'); div.id = 'picker';
  div.innerHTML = '<h1><b>game3d</b> · runtime multi-perfil Three.js — elige un juego</h1>' +
    games.map(([f, n, d]) => '<a href="?game=' + f + '"><b>' + n + '</b><span>' + f + ' · ' + d + '</span></a>').join('') +
    '<div style="color:#5a6472;font-size:12px;max-width:520px;text-align:center">Runtimes: ' + Object.keys(runtimes).join(', ') +
    '. El protocolo declara datos; la semántica de cada género es del motor (SPEC §8) — un perfil nuevo requiere su módulo de runtime.</div>';
  document.body.appendChild(div);
} else {
  const s = document.createElement('script'); s.src = src;
  s.onload = () => boot(window.GAME);
  s.onerror = () => document.getElementById('g3d-msg').textContent = 'No se pudo cargar ' + src;
  document.body.appendChild(s);
}
</script>
