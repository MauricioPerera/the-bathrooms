<script>
/**
 * engine-core.js — Toolkit compartido por los motores de demo (adventure / dungeon / roguelike).
 * Centraliza lo que se duplicaba: el color de paleta, el dibujo de un tile (tileArt 8x8) y el
 * escapado HTML. NO es parte del protocolo: es codigo de motor reutilizable.
 *   EngineCore.esc(s)                              -> string seguro para innerHTML
 *   EngineCore.makeRenderer(ctx, {ART, PAL, SCALE}) -> { rgb, drawTile, TS }
 */
(function () {
  function esc(s) {
    return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }
  function makeRenderer(ctx, opt) {
    const ART = opt.ART, PAL = opt.PAL, SCALE = opt.SCALE, TS = 8 * SCALE;

    const h = rgHurt(G, S); if (h !== 'ok') return h;
  }
  if (room.goal && room.goal.col === nc && room.goal.row === nr) { S.won = true; return 'win'; }
  return ev;
}
function rgAttack(G, S) {
  if (S.won || S.lost) return 'none';
  const room = rgRoom(S);
  if (room.boss && room.boss.alive && Math.abs(room.boss.col - S.pos.col) + Math.abs(room.boss.row - S.pos.row) === 1) {
    room.boss.hp -= rgAtkEff(S);
    if (room.boss.hp <= 0) { room.boss.alive = false; S.kills++; rgXP(G, S); return 'boss-kill'; }
    return 'boss-hit';
  }
  for (const e of room.enemies)
    if (e.alive && Math.abs(e.col - S.pos.col) + Math.abs(e.row - S.pos.row) === 1) {
      e.hp -= rgAtkEff(S);
      if (e.hp <= 0) { e.alive = false; S.kills++; return rgXP(G, S) ? 'kill-levelup' : 'kill'; }
      return 'hit';
    }
  return 'none';
}
function rgPatrol(G, S) {
  if (S.won || S.lost) return 'ok';
  if (S.invuln > 0) S.invuln--;
  const room = rgRoom(S);
  for (const e of room.enemies) {
    if (!e.alive) continue;
    const dx = e.axis === 'v' ? 0 : e.dir, dy = e.axis === 'v' ? e.dir : 0;
    let nc = e.col + dx, nr = e.row + dy;
    if (rgSolid(G, room, nc, nr)) { e.dir *= -1; nc = e.col - dx; nr = e.row - dy; if (rgSolid(G, room, nc, nr)) continue; }
    e.col = nc; e.row = nr;
    if (e.col === S.pos.col && e.row === S.pos.row) { const h = rgHurt(G, S); if (h !== 'ok') return h; }
  }
  return 'ok';
}

// ============================================================================
// Lógica del perfil `advance-wars` — PURA. Este perfil modela SOLO arte
// extraído (PALETTES + UNITS 4bpp): no hay vocabulario de gameplay (stats,
// daño, terreno, mapa), así que el runtime es un VISOR — desfile de unidades
// sobre la rejilla que declara `platform` (mode grid, cols×rows), con
// inspección y recolocación. Sin combate: inventarlo violaría el principio
// del protocolo (gameplay as DATA). awDecode valida el 4bpp contra la paleta.
// ============================================================================
function awDecode(G, unitName) {
  const u = (G.UNITS || {})[unitName];
  if (!u) return { err: 'unidad inexistente: ' + unitName };
  const pal = (G.PALETTES || [])[u.palette || 0];
  if (!pal) return { err: 'paleta inexistente: ' + u.palette };
  const rows = u.tileData || [];
  if (rows.length !== u.height || rows.some(r => r.length !== u.width)) return { err: 'tileData no es ' + u.height + 'x' + u.width };
  const colors = [];
  for (const r of rows) {
    const cr = [];
    for (const i of r) { if (i < 0 || i > 15) return { err: 'indice 4bpp fuera de 0..15' }; cr.push(pal[i] || [0, 0, 0]); }
    colors.push(cr);
  }
  return { err: null, name: unitName, w: u.width, h: u.height, pixels: rows, colors };
}
function awInit(G) {
  const P = G.platform || {};
  const cols = P.cols || 12, rows = P.rows || 10;
  const names = Object.keys(G.UNITS || {});
  // desfile inicial: unidades repartidas en la fila central, equiespaciadas
  const units = names.map((name, i) => ({ name,
    col: Math.min(cols - 1, Math.floor((i + 1) * cols / (names.length + 1))),
    row: rows >> 1 }));
  return { cols, rows, units, cursor: { col: 0, row: rows >> 1 }, picked: -1 };
}
function awCursor(S, dc, dr) {
  S.cursor.col = Math.max(0, Math.min(S.cols - 1, S.cursor.col + dc));
  S.cursor.row = Math.max(0, Math.min(S.rows - 1, S.cursor.row + dr));
  return 'ok';
}
function awAct(S) {
  const at = S.units.findIndex(u => u.col === S.cursor.col && u.row === S.cursor.row);
  if (S.picked === -1) {
    if (at === -1) return 'blocked';           // no hay unidad que coger
    S.picked = at; return 'pick';
  }
  if (at !== -1 && at !== S.picked) return 'blocked'; // celda ocupada por otra
  S.units[S.picked].col = S.cursor.col; S.units[S.picked].row = S.cursor.row;
  S.picked = -1; return 'place';
}

// LCG determinista para tests/replays (semilla entera -> rnd() en [0,1)).
const lcg = seed => { let s = seed >>> 0; return () => ((s = (s * 1664525 + 1013904223) >>> 0) / 4294967296); };

// Visión de entrenadores: misma fila/columna dentro de `sight`, línea de visión sin
// sólidos (isSolid(c, r) la aporta el runtime). Devuelve el entrenador que ve, o null.
function trainerInSight(trainers, defeated, pos, isSolid) {
  for (const t of (trainers || [])) {
    if (defeated.has(t.name)) continue;
    const dc = pos.col - t.col, dr = pos.row - t.row, sg = t.sight || 3;
    if (!((dc === 0 && Math.abs(dr) <= sg) || (dr === 0 && Math.abs(dc) <= sg))) continue;
    let blocked = false;
    const n = Math.max(Math.abs(dc), Math.abs(dr));
    for (let i = 1; i < n; i++)
      if (isSolid(dr === 0 ? t.col + Math.sign(dc) * i : t.col,
                  dc === 0 ? t.row + Math.sign(dr) * i : t.row)) { blocked = true; break; }
    if (!blocked) return t;
  }
  return null;
}


const G = window.GAME, GEN = G.GENERATOR, SCALE = 6, TS = 8 * SCALE;
const W = GEN.roomW, H = GEN.roomH;
document.getElementById('title').innerHTML = `<b>${EngineCore.esc(G.name || 'Roguelike')}</b> — pisos generados en tiempo real desde el generador del GAME.md`;

const S = rgInit(G);
window.RL = { S };                     // estado expuesto para harnesses
const T = G.TEXT || {};
const room = () => S.rooms[S.cur];

const cv = document.getElementById('c'), ctx = cv.getContext('2d');
cv.width = W * TS; cv.height = H * TS;
const _R = EngineCore.makeRenderer(ctx, { ART: G.TILE_ART, PAL: G.PALETTES, SCALE });
let frame = 0;
function render() {
  const r = room(), tm = r.tilemap;
  for (let rr = 0; rr < H; rr++) for (let cc = 0; cc < W; cc++) _R.drawTile(tm[rr][cc], 0, cc, rr, false);
  for (const it of r.items) if (!it.taken) _R.drawTile(it.tile, it.pal || 0, it.col, it.row, true);
  for (const e of r.enemies) if (e.alive) _R.drawTile(e.tile, e.pal, e.col, e.row, true);
  if (r.boss && r.boss.alive) _R.drawTile(G.BOSS.tile, G.BOSS.pal || 0, r.boss.col, r.boss.row, true);
  if (r.goal) _R.drawTile(r.goal.tile, r.goal.pal, r.goal.col, r.goal.row, true);
  if (!(S.invuln > 0 && ((frame >> 2) & 1))) _R.drawTile(G.PLAYER.tile, G.PLAYER.pal, S.pos.col, S.pos.row, true);
}

function setMsg(t, cls) { const m = document.getElementById('msg'); m.textContent = t; m.className = cls || ''; }
function updHud() {
  const r = room();
  document.getElementById('floor').innerHTML = 'Piso: <b>' + r.z + '</b>';
  document.getElementById('depth').textContent = '(' + r.x + ',' + r.y + ')  Salas: ' + Object.keys(S.rooms).length;
  document.getElementById('hp').innerHTML = 'Vida: <b style="color:#ff7b7b">' + '♥'.repeat(Math.max(0, S.hp)) + '</b><span style="color:#553">' + '♡'.repeat(Math.max(0, S.maxHp - S.hp)) + '</span>';
  document.getElementById('weapon').innerHTML = 'Arma: <b>' + EngineCore.esc(S.weapon) + '</b> (atq ' + (S.atk + S.atkBonus) + (S.atkBonus ? ' = ' + S.atk + '+' + S.atkBonus + ' XP' : '') + ')';
  document.getElementById('keys').innerHTML = 'Llaves: <b>' + S.keys + '</b>';
}

function onEvent(r) {
  if (r === 'door-new' || r === 'stairs-new') setMsg(T.enter || 'Nueva sala generada.');
  else if (r === 'door') setMsg('Sala (' + room().x + ',' + room().y + ')');
  else if (r === 'stairs') setMsg('Piso ' + room().z);
  else if (r === 'locked') setMsg(T.locked || 'Puerta cerrada.');
  else if (r === 'unlock') setMsg(T.unlock || 'La llave abre la puerta.');
  else if (r === 'key') setMsg(T.key || 'Llave.');
  else if (r === 'heal') setMsg((T.heal || 'Curado.') + ' (+' + S.lastItem.amount + ')');
  else if (r === 'weapon') setMsg((T.equip || 'Equipas') + ': ' + S.weapon);
  else if (r === 'weapon-worse') setMsg((S.lastItem.name || 'Arma') + ' — ya tienes algo mejor');
  else if (r === 'boss-blocks' || r === 'boss-contact') setMsg(T.boss || 'El guardian bloquea el cofre.');
  else if (r === 'hurt') setMsg(T.hit || 'Te golpearon.');
  else if (r === 'fallen') setMsg(T.fallen || 'Has caido.');
  else if (r === 'gameover') setMsg('Fin de la partida (permadeath).', 'dead');
  else if (r === 'win') setMsg((G.WIN && G.WIN.text) || '¡Ganaste!', 'win');
  updHud(); renderMap();
}

// --- MINIMAPA: solo el PISO actual; escaleras ▲▼; conexiones cerradas en rojo ---
const mapCanvas = document.getElementById('map'), mctx = mapCanvas.getContext('2d');
function renderMap() {
  document.getElementById('maplabel').textContent = 'MAPA · Piso ' + room().z;
  const ks = Object.keys(S.rooms).filter(k => S.rooms[k].z === room().z); if (!ks.length) return;
  let minx = Infinity, miny = Infinity, maxx = -Infinity, maxy = -Infinity;
  for (const k of ks) { const s = S.rooms[k]; minx = Math.min(minx, s.x); miny = Math.min(miny, s.y); maxx = Math.max(maxx, s.x); maxy = Math.max(maxy, s.y); }
  const cell = 22, box = 15, pad = 8;
  mapCanvas.width = (maxx - minx + 1) * cell + pad * 2; mapCanvas.height = (maxy - miny + 1) * cell + pad * 2;
  const cx = s => pad + (s.x - minx) * cell + cell / 2, cy = s => pad + (s.y - miny) * cell + cell / 2;
  mctx.clearRect(0, 0, mapCanvas.width, mapCanvas.height);
  mctx.lineWidth = 2;
  for (const k of ks) { const s = S.rooms[k];
    for (const d of s.doors) { const st = RG_STEP[d.dir]; const nKey = (s.x + st[0]) + ',' + (s.y + st[1]) + ',' + s.z;
      const nx = cx(s) + st[0] * cell / 2, ny = cy(s) + st[1] * cell / 2;
      const col = d.locked ? '#b04040' : (S.rooms[nKey] ? '#54657d' : '#2b333f');
      mctx.strokeStyle = col; mctx.beginPath(); mctx.moveTo(cx(s), cy(s));
      if (S.rooms[nKey] && !d.locked) mctx.lineTo(cx(S.rooms[nKey]), cy(S.rooms[nKey])); else mctx.lineTo(nx, ny);
      mctx.stroke(); } }
  mctx.font = '8px system-ui'; mctx.textAlign = 'center'; mctx.textBaseline = 'middle';
  for (const k of ks) { const s = S.rooms[k]; const x = cx(s) - box / 2, y = cy(s) - box / 2;
    mctx.fillStyle = (s.goal && !S.won) ? '#ffe08a' : (k === S.cur ? '#ffd86b' : '#3f5167'); mctx.fillRect(x, y, box, box);
    if (k === S.cur) { mctx.strokeStyle = '#fff'; mctx.lineWidth = 2; mctx.strokeRect(x, y, box, box); }
    if (s.hasUp) { mctx.fillStyle = '#9fffa6'; mctx.fillText('▲', cx(s) + box / 2 - 3, cy(s) - box / 2 + 3); }
    if (s.hasDown) { mctx.fillStyle = '#8fd6ff'; mctx.fillText('▼', cx(s) - box / 2 + 3, cy(s) + box / 2 - 3); } }
}

addEventListener('keydown', e => { const k = e.key;
  if (k === 'ArrowLeft') onEvent(rgMove(G, S, -1, 0));
  else if (k === 'ArrowRight') onEvent(rgMove(G, S, 1, 0));
  else if (k === 'ArrowUp') onEvent(rgMove(G, S, 0, -1));
  else if (k === 'ArrowDown') onEvent(rgMove(G, S, 0, 1));
  else if (k === ' ') { const r = rgAttack(G, S);
    if (r === 'kill' || r === 'boss-kill') setMsg((r === 'boss-kill' ? (T.bossdown || 'El guardian cae.') : (T.defeat || 'Derrotado.')) + ' (' + S.weapon + ')');
    else if (r === 'kill-levelup') setMsg((T.levelup || 'Subes de ataque.') + ' (atq ' + (S.atk + S.atkBonus) + ')');
    else if (r === 'hit' || r === 'boss-hit') setMsg('Golpeas con ' + S.weapon + '.');
    updHud(); }
  else return; e.preventDefault(); });

updHud(); renderMap(); setMsg(T.intro || '');
(function loop() { requestAnimationFrame(loop); frame++;
  if (frame % 24 === 0 && !S.won && !S.lost) { const r = rgPatrol(G, S); if (r !== 'ok') onEvent(r); }
  render(); })();
</script>
