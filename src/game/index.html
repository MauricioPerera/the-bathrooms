<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>The Bathrooms</title>
<style>
  html, body { margin: 0; height: 100%; background: #05060a; overflow: hidden; }
  canvas { display: block; }
  #overlay {
    position: fixed; inset: 0; z-index: 40;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: radial-gradient(circle at 50% 40%, #14180f 0%, #05060a 80%);
    color: #cdd0b6; font-family: "Courier New", monospace; text-align: center;
    cursor: pointer; user-select: none;
  }
  #overlay h1 { font-size: 40px; letter-spacing: 6px; margin: 0 0 10px; text-shadow: 0 0 12px #000; }
  #overlay .hint { font-size: 15px; opacity: 0.75; margin: 4px 0; letter-spacing: 1px; }
  #overlay .enter { margin-top: 26px; font-size: 18px; letter-spacing: 3px; opacity: 0.9; animation: pulse 1.6s ease-in-out infinite; }
  @keyframes pulse { 0%,100% { opacity: 0.35; } 50% { opacity: 0.95; } }
</style>
<script src="game-data.generated.js"></script>
<script type="importmap">
{ "imports": { "three": "../../vendor/three/three.module.js" } }
</script>
</head>
<body>
  <div id="overlay">
    <h1 data-title>The Bathrooms</h1>
    <div class="hint" data-hint>WASD para caminar, mouse para mirar</div>
    <div class="enter">[ CLICK PARA ENTRAR ]</div>
  </div>
  <script type="module" src="main.mjs"></script>
</body>
</html>
